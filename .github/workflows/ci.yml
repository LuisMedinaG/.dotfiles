name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Job 1: ShellCheck static analysis ───────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: ludeeus/action-shellcheck@2.0.0
        env:
          # Excluded codes:
          #   SC1090/SC1091: can't follow non-constant `source` (machine-local)
          #   SC2312: subshell return masking (used deliberately for cache checks)
          #   SC2034: variable appears unused (ShellCheck can't trace usage
          #           through trap-invoked cleanup functions)
          #   SC2317: command appears unreachable (false-positive for trap
          #           handlers)
          SHELLCHECK_OPTS: >-
            --severity=warning
            --exclude=SC1090,SC1091,SC2312,SC2034,SC2317
        with:
          # ShellCheck has no zsh support — .zsh* files are validated by
          # `zsh -n` in the zsh-syntax job. Only `.sh` files and shebangs
          # are scanned here.
          scandir: '.'
          severity: warning
          ignore_paths: '.git tests/e2e .zsh'
          ignore_names: '.zshenv .zprofile .zshrc'

  # ─── Job 2: ZSH syntax + full test suite ─────────────────────────────────────
  zsh-syntax:
    name: ZSH syntax & test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh shellcheck

      - name: Stage dotfiles into $HOME
        run: |
          set -euo pipefail
          cp .zshenv .zshrc .zprofile "$HOME/"
          cp -r .zsh "$HOME/.zsh"
          mkdir -p "$HOME/.config" "$HOME/.local/bin"
          cp -r .config/yadm "$HOME/.config/yadm"
          cp -r .config/brew "$HOME/.config/brew"
          [ -d .local/bin ] && cp -r .local/bin/. "$HOME/.local/bin/"

      - name: Run test suite
        run: sh tests/run_all.sh

  # ─── Job 3: Shell startup time budget ────────────────────────────────────────
  # Fails if mean zsh -i -c exit time exceeds 400ms.
  # Acts as a regression gate: any PR that re-introduces a synchronous eval
  # will show up here before it lands on main.
  startup-perf:
    name: Startup time budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh git

      - name: Stage dotfiles into $HOME
        run: |
          cp .zshenv .zshrc .zprofile "$HOME/"
          cp -r .zsh "$HOME/.zsh"
          mkdir -p "$HOME/.cache/zsh" "$HOME/.local/share/zinit"

      # Cache Zinit + plugins so the benchmark measures steady-state startup,
      # not first-time clone overhead. Key on the plugin manifest so a new
      # plugin invalidates the cache and re-downloads.
      - uses: actions/cache@v4
        id: zinit-cache
        with:
          path: ~/.local/share/zinit
          key: zinit-${{ runner.os }}-${{ hashFiles('.zsh/plugins/init.zsh') }}
          restore-keys: |
            zinit-${{ runner.os }}-

      # Explicitly clone Zinit + every plugin. Relying on `zsh -i -c exit`
      # for first-time bootstrap fails because turbo-deferred plugins never
      # fire (no first-prompt event in `-c exit`).
      - name: Pre-install Zinit and plugins (cache miss path)
        if: steps.zinit-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          ZHOME="$HOME/.local/share/zinit"
          mkdir -p "$ZHOME/plugins"
          [ -d "$ZHOME/zinit.git" ] || \
            git clone --depth=1 https://github.com/zdharma-continuum/zinit "$ZHOME/zinit.git"
          for plugin in \
              djui---alias-tips \
              Aloxaf---fzf-tab \
              olets---zsh-abbr \
              zsh-users---zsh-autosuggestions \
              zsh-users---zsh-syntax-highlighting; do
            owner_repo=${plugin//---//}
            target="$ZHOME/plugins/$plugin"
            [ -d "$target" ] || git clone --depth=1 "https://github.com/$owner_repo" "$target"
          done

      - name: Diagnostic — capture one shell run for context
        run: |
          echo "── Single zsh -i -c exit, full output ──"
          zsh -i -c exit 2>&1 | head -40 || echo "zsh exit code: $?"
          echo ""
          echo "── ZSH version ──"
          zsh --version
          echo ""
          echo "── Zinit dir contents ──"
          ls -la "$HOME/.local/share/zinit/" 2>/dev/null | head -10 || echo "no zinit dir"
          ls -la "$HOME/.local/share/zinit/plugins/" 2>/dev/null | head -10 || echo "no plugins dir"

      - name: Benchmark startup (5 runs, mean must be < 600ms)
        run: |
          # 600ms budget accommodates CI runner variance (shared CPU,
          # network filesystem). Tighten locally with STARTUP_BUDGET_MS=400.
          BUDGET_MS=600
          RUNS=5
          total_ms=0
          for i in $(seq 1 "$RUNS"); do
            start=$(date +%s%N)
            zsh -i -c exit >/dev/null 2>&1
            end=$(date +%s%N)
            ms=$(( (end - start) / 1000000 ))
            echo "Run $i: ${ms}ms"
            total_ms=$(( total_ms + ms ))
          done
          mean_ms=$(( total_ms / RUNS ))
          echo "─────────────────────────────"
          echo "Mean startup: ${mean_ms}ms (budget: ${BUDGET_MS}ms)"
          if [ "$mean_ms" -ge "$BUDGET_MS" ]; then
            echo "FAIL: startup exceeds ${BUDGET_MS}ms budget."
            echo "Profile with:  ZPROF=1 zsh -i -c exit"
            exit 1
          fi
          echo "PASS"

  # ─── Job 4: E2E (linuxbox profile in Docker) ─────────────────────────────────
  e2e-linuxbox:
    name: E2E linuxbox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Run existing test container
        run: |
          docker build -t dotfiles-test -f Dockerfile.test .
          docker run --rm -e DOTFILES_PROFILE=linuxbox dotfiles-test

      - name: E2E assertions in fresh container
        run: |
          docker run --rm -e DOTFILES_PROFILE=linuxbox \
            -v "$PWD:/repo:ro" debian:bookworm-slim bash -euxc '
              apt-get update -qq
              apt-get install -qq -y zsh git curl
              cp /repo/.zshenv /repo/.zshrc /repo/.zprofile /root/
              cp -r /repo/.zsh /root/.zsh
              mkdir -p /root/.cache/zsh /root/.local/share/zinit

              # Shell must reach a ready state without error
              zsh -i -c "
                set -e
                # source_if_exists defined in .zshenv
                type source_if_exists >/dev/null
                # take() defined in functions.zsh
                type take >/dev/null
                # HISTFILE set by history.zsh
                [[ -n \$HISTFILE ]] || { echo FAIL: HISTFILE not set; exit 1; }
                echo OK: shell initialised cleanly
              "
            '

  # ─── Job 5: BATS e2e test suite ──────────────────────────────────────────────
  bats:
    name: BATS e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install bats-core and dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y zsh git
          # Install bats-core from source — Ubuntu's `bats` apt package is
          # the legacy 0.4.0 fork that lacks BATS_TEST_DIRNAME and other
          # variables modern test files rely on.
          git clone --depth=1 https://github.com/bats-core/bats-core    /tmp/bats-core
          git clone --depth=1 https://github.com/bats-core/bats-support /tmp/bats-support
          git clone --depth=1 https://github.com/bats-core/bats-assert  /tmp/bats-assert
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: Stage dotfiles
        run: |
          cp .zshenv .zshrc .zprofile "$HOME/"
          cp -r .zsh "$HOME/.zsh"
          mkdir -p "$HOME/.cache/zsh" "$HOME/.local/share/zinit/plugins"

      - uses: actions/cache@v4
        id: zinit-cache
        with:
          path: ~/.local/share/zinit
          key: zinit-${{ runner.os }}-${{ hashFiles('.zsh/plugins/init.zsh') }}
          restore-keys: |
            zinit-${{ runner.os }}-

      - name: Pre-install Zinit and plugins (cache miss path)
        if: steps.zinit-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          ZHOME="$HOME/.local/share/zinit"
          mkdir -p "$ZHOME/plugins"
          [ -d "$ZHOME/zinit.git" ] || \
            git clone --depth=1 https://github.com/zdharma-continuum/zinit "$ZHOME/zinit.git"
          for plugin in \
              djui---alias-tips \
              Aloxaf---fzf-tab \
              olets---zsh-abbr \
              zsh-users---zsh-autosuggestions \
              zsh-users---zsh-syntax-highlighting; do
            owner_repo=${plugin//---//}
            target="$ZHOME/plugins/$plugin"
            [ -d "$target" ] || git clone --depth=1 "https://github.com/$owner_repo" "$target"
          done

      - name: Run BATS e2e tests
        env:
          BATS_SUPPORT_PATH: /tmp/bats-support
          BATS_ASSERT_PATH: /tmp/bats-assert
        run: |
          if [ -d tests/e2e ] && ls tests/e2e/*.bats 1>/dev/null 2>&1; then
            bats tests/e2e/
          else
            echo "No e2e tests yet — skipping."
          fi

  # ─── Job 6: Brewfile validation (macOS) ──────────────────────────────────────
  brewfile:
    name: Brewfile check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Brewfiles strictly
        run: |
          set -euo pipefail
          brew update

          # `brew bundle check` only verifies packages are *installed* on the
          # local machine — it always fails on a fresh CI runner.
          # We validate the name of every formula/cask via `brew info`, which
          # is fast and contacts the local tap database (refreshed by `brew
          # update`). No installs, no upgrades, no surprises.

          validate_brewfile() {
            local brewfile="$1"
            local errors=0
            local kind name flag
            echo "── $brewfile ──"
            while IFS= read -r line; do
              # Skip blanks and comments
              [ -z "$line" ] && continue
              case "$line" in \#*) continue ;; esac
              # Lines look like:  brew "name"   /   cask "name"   /   tap "owner/repo"
              kind=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | sed -n 's/^[a-z]*  *"\([^"]*\)".*/\1/p')
              [ -z "$name" ] && continue
              case "$kind" in
                tap)
                  echo "  tap  $name (registered, not validated)"
                  ;;
                brew)
                  flag=--formula
                  if brew info "$flag" "$name" >/dev/null 2>&1; then
                    echo "  ✓ brew $name"
                  else
                    echo "  ✗ brew $name — NOT FOUND in any tap"
                    errors=$((errors + 1))
                  fi
                  ;;
                cask)
                  if brew info --cask "$name" >/dev/null 2>&1; then
                    echo "  ✓ cask $name"
                  else
                    echo "  ✗ cask $name — NOT FOUND in any tap"
                    errors=$((errors + 1))
                  fi
                  ;;
                mas|vscode|whalebrew)
                  echo "  ${kind} $name (not validated)"
                  ;;
              esac
            done < "$brewfile"
            if [ "$errors" -gt 0 ]; then
              echo ""
              echo "FAIL: $errors unresolved package(s) in $brewfile"
              return 1
            fi
            return 0
          }

          validate_brewfile .config/brew/Brewfile
          echo ""
          validate_brewfile .config/brew/Brewfile.work

      - name: Brewfile.work must be a subset of Brewfile
        run: |
          comm -23 \
            <(brew bundle list --file .config/brew/Brewfile.work | sort) \
            <(brew bundle list --file .config/brew/Brewfile | sort) \
            > extras.txt
          if [ -s extras.txt ]; then
            echo "FAIL: Brewfile.work has packages not in Brewfile:"
            cat extras.txt
            exit 1
          fi
          echo "OK: Brewfile.work is a strict subset of Brewfile."

  # ─── Job 7: Secret scanning ───────────────────────────────────────────────────
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
