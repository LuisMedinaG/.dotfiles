name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Job 1: Shell syntax + ShellCheck ──────────────────────────────────────
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh and shellcheck
        run: sudo apt-get update && sudo apt-get install -y zsh shellcheck

      - name: zsh -n on all zsh files
        run: |
          set -e
          echo "Checking zsh files..."
          for f in .zshenv .zprofile .zshrc .zsh/**/*.zsh .zsh/*.zsh; do
            if [ -f "$f" ]; then
              echo "  $f"
              zsh -n "$f" 2>&1 || { echo "FAIL: $f"; exit 1; }
            fi
          done
          echo "All zsh files: OK"

      - name: sh -n + shellcheck on all shell scripts
        run: |
          set -e
          echo "Checking shell scripts..."
          find .config/yadm/phases .local/bin -type f \( -name '*.sh' -o -perm -u+x \) -print0 |
            while IFS= read -r -d '' f; do
              # Skip files that aren't actually shell scripts
              head -1 "$f" | grep -q '^#!/.*sh' || continue
              echo "  $f"
              sh -n "$f" 2>&1 || { echo "FAIL: $f"; exit 1; }
              shellcheck --exclude=SC1091,SC2312 --severity=warning "$f" || true
            done
          echo "All shell scripts: OK"

  # ─── Job 2: BATS e2e ───────────────────────────────────────────────────────
  bats:
    name: BATS e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y zsh git
          # Install bats-core from source (Ubuntu apt has the legacy 0.4.0 fork)
          git clone --depth=1 https://github.com/bats-core/bats-core    /tmp/bats-core
          git clone --depth=1 https://github.com/bats-core/bats-support /tmp/bats-support
          git clone --depth=1 https://github.com/bats-core/bats-assert  /tmp/bats-assert
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Stage dotfiles into $HOME
        run: |
          cp .zshenv .zshrc .zprofile "$HOME/"
          cp -r .zsh "$HOME/.zsh"
          mkdir -p "$HOME/.cache/zsh" "$HOME/.local/share/zinit/plugins"

      - uses: actions/cache@v4
        id: zinit-cache
        with:
          path: ~/.local/share/zinit
          key: zinit-${{ runner.os }}-${{ hashFiles('.zsh/plugins/init.zsh') }}
          restore-keys: zinit-${{ runner.os }}-

      - name: Pre-install Zinit and plugins (cache miss path)
        if: steps.zinit-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          ZHOME="$HOME/.local/share/zinit"
          mkdir -p "$ZHOME/plugins"
          [ -d "$ZHOME/zinit.git" ] || \
            git clone --depth=1 https://github.com/zdharma-continuum/zinit "$ZHOME/zinit.git"
          for plugin in \
              djui---alias-tips \
              Aloxaf---fzf-tab \
              olets---zsh-abbr \
              zsh-users---zsh-autosuggestions \
              zsh-users---zsh-syntax-highlighting; do
            owner_repo=${plugin//---//}
            target="$ZHOME/plugins/$plugin"
            [ -d "$target" ] || git clone --depth=1 "https://github.com/$owner_repo" "$target"
          done

      - name: Run BATS e2e tests
        env:
          BATS_SUPPORT_PATH: /tmp/bats-support
          BATS_ASSERT_PATH: /tmp/bats-assert
        run: bats tests/e2e/

  # ─── Job 3: Brewfile validation (macOS) ────────────────────────────────────
  brewfile:
    name: Brewfile check (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Brewfile entries
        run: |
          set -euo pipefail
          brew update

          validate_brewfile() {
            local brewfile="$1"
            local errors=0
            local kind name
            echo "── $brewfile ──"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in \#*) continue ;; esac
              kind=$(echo "$line" | awk '{print $1}')
              name=$(echo "$line" | sed -n 's/^[a-z]*  *"\([^"]*\)".*/\1/p')
              [ -z "$name" ] && continue
              case "$kind" in
                tap) echo "  tap  $name" ;;
                brew)
                  if brew info --formula "$name" >/dev/null 2>&1; then
                    echo "  ✓ brew $name"
                  else
                    echo "  ✗ brew $name — NOT FOUND"
                    errors=$((errors + 1))
                  fi
                  ;;
                cask)
                  if brew info --cask "$name" >/dev/null 2>&1; then
                    echo "  ✓ cask $name"
                  else
                    echo "  ✗ cask $name — NOT FOUND"
                    errors=$((errors + 1))
                  fi
                  ;;
              esac
            done < "$brewfile"
            [ "$errors" -gt 0 ] && return 1 || return 0
          }

          validate_brewfile .config/brew/Brewfile
          echo ""
          validate_brewfile .config/brew/Brewfile.work

      - name: Brewfile.work must be a subset of Brewfile
        run: |
          comm -23 \
            <(brew bundle list --file .config/brew/Brewfile.work | sort) \
            <(brew bundle list --file .config/brew/Brewfile | sort) \
            > extras.txt
          if [ -s extras.txt ]; then
            echo "FAIL: Brewfile.work has packages not in Brewfile:"
            cat extras.txt
            exit 1
          fi

  # ─── Job 4: Secret scan ────────────────────────────────────────────────────
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
