# Mackup — back up app preferences that yadm doesn't track
#
# Usage:
#   mackup backup     — copy app settings → dotfiles repo
#   mackup restore    — copy dotfiles repo → app settings
#   mackup list       — show supported apps
#
# Note: copy mode only (link mode broken on macOS Sonoma+)

[storage]
engine = file_system
path = .config/mackup
directory = backup

[applications_to_sync]
# GUI app preferences (plists, Application Support configs)
# These live in ~/Library/ and are hard to track with yadm directly
iterm2
vscode
spotify
bettertouchtool
homerow
multitouch
swish
