# Light theme - Solarized purple
set -g status-position       bottom
set -g status-style          "bg=#e8e8e8,fg=#555555"
set -g status-left           "#[fg=#ffffff,bg=#6c71c4,bold] #S #[default] "
set -g status-left-length    20
set -g status-right          "#{tmux_mode_indicator} #[fg=#6c71c4]#I · #P  #[fg=#999999]%H:%M "
set -g window-status-format         "#[fg=#999999] #I · #W "
set -g window-status-current-format "#[fg=#6c71c4,bold] #I · #W "
set -g window-status-separator      ""
set -g message-style         "bg=#6c71c4,fg=#ffffff"
set -g pane-border-style        "fg=#cccccc"
set -g pane-active-border-style "fg=#6c71c4"
