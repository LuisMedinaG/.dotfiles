# Dark theme - Cole (earth tones)
set -g status-position       bottom
set -g status-style          "bg=#101010,fg=#f2e6cf"
set -g status-left           "#[bg=#cc5d4b,fg=#121212,bold] #S #[bg=#101010,fg=#f2e6cf] "
set -g status-left-length    20
set -g status-right          "#{tmux_mode_indicator} #[fg=#b38d59]#I · #P  #[fg=#f2e6cf]%H:%M "
set -g window-status-format         "#[fg=#666666] #I · #W "
set -g window-status-current-format "#[bg=#b38d59,fg=#121212,bold] #I · #W "
set -g window-status-separator      ""
set -g message-style         "bg=#121212,fg=#f2e6cf"
set -g pane-border-style        "fg=#3d3d3d"
set -g pane-active-border-style "fg=#cc9b52"
# Re-run after status-right is set so the placeholder gets replaced.
run-shell 'test -f ~/.config/tmux/plugins/tmux-mode-indicator/mode_indicator.tmux && ~/.config/tmux/plugins/tmux-mode-indicator/mode_indicator.tmux || true'
