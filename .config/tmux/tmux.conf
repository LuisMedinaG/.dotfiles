# tmux configuration - minimal and clean
#
# KEY NOTATION:
#   C-    = Ctrl   (e.g. C-c = Ctrl+C)
#   M-    = Alt/Option (e.g. M-1 = Alt+1)
#   S-    = Shift  (e.g. S-Left = Shift+LeftArrow)
#   -n    = "no prefix" — key works directly, without pressing prefix first
#   -T    = table — key only active in a specific mode (e.g. copy-mode-vi)
#   bind  = bind-key (same thing, shorter)
#   ;     = chain commands (escape as \; in bind)
#   :^    = first window
#   :$    = last window
#   :N    = window number N
#   #{}   = format variable (e.g. #{pane_current_path}, #{?mouse,ON,OFF})
#
# PREFIX: C-b (default) + C-a (secondary). Avoids macOS C-space input
# source switching conflict. C-a is the GNU screen prefix — familiar
# to many terminal users.

# ============================================================================
# PREFIX KEY
# ============================================================================
# C-b is the default prefix — no unbind needed.
# C-a as secondary prefix for screen muscle memory.
set -g prefix2 C-a
bind-key C-a send-prefix -2

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

# --- Terminal and colors ---

# tmux-256color is the most compatible terminfo. The terminal-features
# override adds true-color (RGB) support for xterm-compatible terminals
# without requiring a separate tmux-direct terminfo entry.
set -g default-terminal "tmux-256color"
set-option -sa terminal-features ",xterm*:RGB"

# --- Window and pane numbering ---

# Start at 1 instead of 0 — matches terminal tabs and browser behavior.
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed or moved, so the
# numbers stay sequential (1, 2, 3...) instead of leaving gaps.
setw -g renumber-windows on

# --- Behavior ---

# Disable the terminal bell entirely — no audible ding on activity.
set -g bell-action none

# Keep the last pane's output visible after it exits, so you can
# scroll up and review it. The pane stays until you explicitly kill it.
set -g remain-on-exit on

# Escape key timeout. The default 500ms adds noticeable latency when
# pressing Escape in vim. 0ms is ideal but can cause issues with some
# terminals that send ambiguous escape sequences. 50ms is a safe middle
# ground — fast enough for vim, slow enough for legacy terminals.
set -s escape-time 50

# Scrollback buffer size. 10000 lines is ~50MB — enough for most
# workflows without hogging memory. Increase if you need more history.
set-option -g history-limit 10000

# When multiple clients connect to the same session, use the largest
# terminal dimensions rather than constraining to the smallest client.
set -g window-size largest

# Forward the window title to the parent terminal emulator's tab.
# #h = hostname, #W = window name (auto-set by shell).
set -g set-titles on
set -g set-titles-string "#h: #W"

# Highlight the status bar when there's activity in an inactive window.
# activity-action=none suppresses the visual "Activity in window N!"
# message — the status bar highlight is enough.
set -g monitor-activity on
set -g activity-action none

# --- Mouse and focus ---

# Enable mouse: click to select pane, drag to resize, scroll to
# navigate history, click status bar to switch windows.
set -g mouse on

# Tell tmux to track focus events (needed for vim-tmux-navigator
# to detect when focus leaves tmux, and for neovim's FocusGained).
set -g focus-events on

# --- Vi mode ---

# Use vi keybindings in copy mode (hjkl navigation, v to select).
setw -g mode-keys vi

# --- iTerm2 integration ---

# Allow iTerm2 passthrough escape sequences (used by tools like
# imgcat, it2copy, and other iTerm2-specific features).
set-option -g allow-passthrough on

# ============================================================================
# KEY BINDINGS
# ============================================================================

# --- Pane management ---

# Split panes with mnemonic keys: _ for horizontal (looks like a
# horizontal line), - for vertical (looks like a vertical line).
# Always start new panes in the current directory.
bind _ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# Kill pane with confirmation — prevents accidental closes.
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# --- Pane navigation (no prefix) ---

# Alt+arrow keys to move between panes. Works like vim's Ctrl+hjkl
# but without the prefix. These are the most frequently used bindings.
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Window navigation (no prefix) ---

# Alt+number selects the corresponding window (1-9). Matches iTerm2
# and browser tab behavior. M-0 and M-9 go to first/last window.
# M-{ and M-} cycle prev/next (like iTerm2's Cmd+Shift+[ / ]).
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t ":$"
bind -n M-0 select-window -t ":^"
bind -n M-{ previous-window
bind -n "M-}" next-window

# --- Window navigation (with prefix) ---

# Prefix+0 and Prefix+9 for first/last window (muscle memory from
# default tmux where C-b 0 selects window 0, which is actually the
# first window when base-index=1).
bind 0 select-window -t ":^"
bind 9 select-window -t ":$"

# --- Copy mode (vi bindings) ---

# v starts selection, C-v toggles rectangle mode, y yanks and exits.
# Matches vim's visual mode and yank behavior.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Utilities ---

# Prefix+y toggles synchronize-panes — type in all panes at once.
# Useful for running the same command across multiple servers.
bind y set synchronize-panes\; display 'synchronize-panes #{?synchronize-panes,on,off}'

# Prefix+m toggles mouse mode. Handy when you want to disable mouse
# interference during presentations or when working over slow links.
bind m set-option -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Prefix+t toggles the status bar. Gives you fullscreen terminal
# real estate when you don't need window/pane info.
bind t set-option status \; display "Status: #{?status,ON,OFF}"

# Prefix+r reloads this config file. Use after making changes.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "#[fg=green]✓ #{config_files}"

# ============================================================================
# STATUS BAR
# ============================================================================

# Status bar styling. mode indicator shows PREFIX/COPY/SYNC when active.
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[fg=colour235,bg=colour33,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#{tmux_mode_indicator} #[fg=colour33]#I:#P "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour33,bold] #I:#W #[default]"
set -g window-status-separator ""
set -g message-style "bg=colour33,fg=colour235"

# ============================================================================
# HELP POPUP (tmux 3.2+)
# ============================================================================
# Prefix+? shows a quick reference of all bindings in a floating window.

bind "?" display-popup -w 80% -h 80% "
    echo '  PANES'
    echo '  _  Split horizontal    -  Split vertical'
    echo '  x  Kill pane (confirm) M-arrows  Navigate panes'
    echo ''
    echo '  WINDOWS'
    echo '  M-1..8  Select window   M-0/^  First window'
    echo '  M-9/\$  Last window      M-{/}  Prev/next'
    echo '  C-c     New window after current'
    echo ''
    echo '  COPY MODE (prefix+[)'
    echo '  v  Begin selection    C-v  Rectangle toggle'
    echo '  y  Yank and exit'
    echo ''
    echo '  UTILITIES'
    echo '  y  Toggle sync-panes   m  Toggle mouse'
    echo '  t  Toggle status bar   r  Reload config'
    echo ''
    echo '  PLUGIN: prefix+I to install, prefix+U to update'
    echo ''
    echo '  Press Esc to close'
    sleep 60
"

# ============================================================================
# VERSION-GATED FEATURES
# ============================================================================

if-shell -F "#{>=:#{version},3.2}" {
    # Highlight search matches in copy mode — yellow for all matches,
    # orange+bold for the currently selected match.
    set -g copy-mode-match-style "bg=colour136,fg=colour235"
    set -g copy-mode-current-match-style "bg=colour166,fg=colour235,bold"
}

if-shell -F "#{>=:#{version},3.3}" {
    # Show arrows on pane borders indicating which direction you can
    # navigate. Replaces the subtle color change on the active border.
    set -g pane-border-indicators arrows
}

# ============================================================================
# PLUGINS
# ============================================================================
# Managed by TPM (Tmux Plugin Manager). Install with prefix+I.
#
# tmux-yank       — copy to system clipboard (macOS pbcopy, Linux xclip)
# tmux-mode-indicator — shows PREFIX/COPY/SYNC in status bar

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'

set -g @yank_selection_mouse 'clipboard'

# --- Mode indicator (prefix copy, sync) ---
# Shows in status bar when prefix is pressed, in copy mode, or sync-panes on.
set -g @mode_indicator_prefix_prompt ' PREFIX '
set -g @mode_indicator_copy_prompt ' COPY '
set -g @mode_indicator_sync_prompt ' SYNC '
set -g @mode_indicator_empty_prompt ''
set -g @mode_indicator_prefix_mode_style 'bg=colour136,fg=colour235'
set -g @mode_indicator_copy_mode_style 'bg=colour166,fg=colour235'
set -g @mode_indicator_sync_mode_style 'bg=colour125,fg=colour235'
set -g @mode_indicator_empty_mode_style 'default'

# ============================================================================
# PLUGIN MANAGER
# ============================================================================
# Auto-install TPM if missing. Runs on every tmux start but is
# effectively a no-op after the first run.

if "test ! -d ~/.config/tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
